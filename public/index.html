<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>STEAMing Games</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet"
    integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB" crossorigin="anonymous">
  <link rel="stylesheet" href="styles.css">
</head>
<body>


  <nav class="navbar navbar-expand-lg navbar-dark navbar-steam">
    <div class="container">
      <a class="navbar-brand fw-bold fs-4" href="index.html">STEAMing Games</a>
    </div>
  </nav>

  <div class="container py-5">
    <div class="row g-2 mb-5 align-items-center">
      <div class="col-sm-5">
        <input type="text" id="search" class="form-control form-control-steam"
          placeholder="Buscar jogo...">
      </div>
      <div class="col-sm-4">
        <select id="category" class="form-select form-control-steam">
          <option value="Todas">Todas as categorias</option>
        </select>
      </div>
      <div class="col-sm-3">
        <button id="btnRender" class="btn btn-primary w-100">Filtrar</button>
      </div>
    </div>

    <div id="product-list" class="row row-cols-1 row-cols-sm-2 row-cols-md-3 row-cols-lg-4 g-4"></div>

  </div>

  <footer class="footer-steam text-center py-4 mt-5">
    <p class="mb-0 text-muted small">2026 STEAMing Games — Nenhum direito reservado</p>
  </footer>

  <script src="app.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js"
    integrity="sha384-FKyoEForCGlyvwx9Hj09JcYn3nv7wiPVlz7YYwJrWVcXK/BmnVDxM+D2scQbITxI"
    crossorigin="anonymous"></script>
</body>
</html>
